name: Waka Readme

on:
  schedule:
    - cron: '0 0 * * *' # every Midnight UTC
  workflow_dispatch: # allow manual run
  push:
    branches:
      - main

jobs:
  update-readme:
    name: Update WakaTime Stats
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          TIME_RANGE: all_time
          BLOCKS: -#
